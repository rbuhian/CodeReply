name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'

  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codereply_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './src/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm test -- --coverage --maxWorkers=2
        env:
          NODE_ENV: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_NAME: codereply_test

      - name: Verify test coverage threshold
        run: |
          echo "Checking test coverage..."
          # Add coverage threshold check here if needed

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './src/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci --production=false

      - name: Build application
        run: npm run build --if-present || npx tsc

      - name: Create deployment artifact
        run: |
          mkdir -p deploy
          cp -r dist package.json package-lock.json deploy/ || echo "No dist folder"
          tar -czf deploy.tar.gz deploy/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifact
          path: ./src/backend/deploy.tar.gz
          retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'staging' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    environment:
      name: staging
      url: https://staging.codereply.app

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifact

      - name: Deploy to Railway (Staging)
        run: |
          echo "🚀 Deploying to Railway Staging..."
          # Add Railway deployment command here
          # railway up --service backend --environment staging

      - name: Run database migrations
        run: |
          echo "📊 Running database migrations..."
          # Add migration command here
          # railway run --service backend npm run migrate

      - name: Verify deployment
        run: |
          echo "✅ Verifying staging deployment..."
          curl -f https://staging.codereply.app/health || exit 1

      - name: Notify deployment success
        run: |
          echo "✅ Staging deployment successful!"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.codereply.app

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifact

      - name: Deploy to Railway (Production)
        run: |
          echo "🚀 Deploying to Railway Production..."
          # Add Railway deployment command here
          # railway up --service backend --environment production

      - name: Run database migrations
        run: |
          echo "📊 Running production database migrations..."
          # Add migration command here with safety checks
          # railway run --service backend npm run migrate

      - name: Warm up application
        run: |
          echo "🔥 Warming up application..."
          sleep 30
          curl -f https://api.codereply.app/health || exit 1

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add smoke tests here
          curl -f https://api.codereply.app/v1/health || exit 1

      - name: Notify deployment success
        run: |
          echo "✅ Production deployment successful!"
          echo "🎉 CodeReply Backend deployed to production"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-staging, deploy-production]

    steps:
      - name: Rollback deployment
        run: |
          echo "⚠️ Deployment failed, initiating rollback..."
          # Add rollback command here
          # railway rollback --service backend

      - name: Notify rollback
        run: |
          echo "🔄 Deployment rolled back due to failure"
